# Render Blueprint — deploys the NestJS backend + PostgreSQL.
# In Render: New → Blueprint → connect this repo. Render reads this file.
# (The Next.js frontend is deployed separately on Vercel — see DEPLOYMENT.md.)

databases:
  - name: auction-db
    plan: free
    databaseName: auction_db
    user: auction

services:
  - type: web
    name: auction-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: auction-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      # Set this to your Vercel URL after the frontend is deployed,
      # e.g. https://auction-app.vercel.app  (comma-separate multiple).
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_VERSION
        value: "20.18.1"
