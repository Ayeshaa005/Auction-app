# Render Blueprint — deploys the NestJS backend (database is on Neon).
# In Render: New → Blueprint → connect this repo. Render reads this file
# and will ask you to paste DATABASE_URL (your Neon connection string).
# (The Next.js frontend is deployed separately on Vercel — see DEPLOYMENT.md.)

services:
  - type: web
    name: auction-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api
    envVars:
      # Paste your Neon connection string when prompted.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: NODE_VERSION
        value: "20.18.1"
      # CORS is open by default (Bearer-token auth), so no CORS_ORIGIN needed.
